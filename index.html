<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRS Vegas Slots | 🎰 Эмодзи-казино</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Раздел авторизации -->
        <div class="auth-section" id="authSection">
            <div class="auth-card">
                <h1>🎟️ <span class="neon-text">GRS</span> <span class="neon-text">VEGAS</span></h1>
                <h2>✨ Вход в казино ✨</h2>
                <input type="text" id="playerName" placeholder="Ваш никнейм (например: JackPot)" maxlength="15">
                <button class="auth-button" id="loginBtn">🚪 Войти</button>
                <div class="error-message" id="errorMessage"></div>
            </div>
        </div>

        <!-- Основной игровой экран (скрыт по умолчанию) -->
        <div class="game-section" id="gameSection" style="display: none;">
            <!-- Заголовок -->
            <div class="game-header">
                <h1>🎰 <span class="neon-text">GRS</span> <span class="neon-text">SLOTS</span> 🎰</h1>
                <p class="subtitle">⏳ <span id="cooldownTime">5:00</span> до следующей попытки</p>
                <p class="attempts">🎟️ Попыток: <span id="attemptsLeft">1</span></p>
            </div>

            <!-- Барабаны с анимацией -->
            <div class="slot-machine">
                <div class="slot-drum" id="drum1">?</div>
                <div class="slot-drum" id="drum2">?</div>
                <div class="slot-drum" id="drum3">?</div>
            </div>

            <!-- Кнопка спин с анимацией -->
            <button class="spin-button" id="spinBtn" disabled>
                <i class="fas fa-spinner"></i> <span>СПИН!</span>
            </button>

            <!-- Вывод результата -->
            <div class="prize-display" id="prizeDisplay">
                <div class="prize-icon">?</div>
                <div class="prize-text">Выберите приз...</div>
            </div>

            <!-- Лента выигрышей с прокруткой -->
            <div class="live-tape-header">
                <h2>🌟 Live Выигрыши</h2>
                <div class="tape-controls">
                    <button id="pauseTapeBtn"><i class="fas fa-pause"></i></button>
                    <button id="resetTapeBtn"><i class="fas fa-redo"></i></button>
                </div>
            </div>
            <div class="live-tape" id="liveTapeContent">
                <!-- Динамически заполняется JS -->
            </div>
        </div>
    </div>

    <!-- Анимация загрузки -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <h1>🎰 GRS VEGAS</h1>
            <div class="slot-spinner">
                <div class="slot-spinner-item">🍹</div>
                <div class="slot-spinner-item">🍺</div>
                <div class="slot-spinner-item">🥃</div>
                <div class="slot-spinner-item">💰</div>
            </div>
            <p>Загрузка...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
